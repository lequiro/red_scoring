name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar paquete + deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (errores críticos)
        run: flake8 src tests --select=E9,F63,F7,F82 --show-source --statistics

      - name: Tests (pipeline sobre el sample)
        run: pytest -q
